<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verum — Settings</title>
  <link rel="stylesheet" href="./settings.css" />
</head>
<body>
  <header>
    <h1>Verum Settings</h1>
    <div class="chain-selector-row">
      <select id="default-chain-select"></select>
      <button id="add-chain-toggle" title="Add chain">+</button>
    </div>
    <div id="add-chain" class="hidden">
      <div class="row">
        <input id="new-chain-id"   type="number" placeholder="Chain ID (e.g. 17000)" />
        <input id="new-chain-name" type="text"   placeholder="Name (e.g. Holesky)" />
        <button id="add-chain-btn">Add</button>
      </div>
    </div>
  </header>

  <main>
    <div id="chains"></div>

    <div id="cache-section">
      <button id="clear-cache-btn">Clear verification cache</button>
      <span id="cache-info"></span>
    </div>

    <div id="saved-toast" class="hidden">Saved ✓</div>
  </main>

  <script type="module" src="./settings.ts"></script>
</body>
</html>
