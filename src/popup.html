<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Web3 Proof</title>
  <link rel="stylesheet" href="./popup.css" />
</head>
<body>
  <div id="nav-bar">
    <span id="nav-scheme">web3://</span>
    <input id="nav-input" type="text" spellcheck="false" autocomplete="off"
           placeholder="11155111:tx:0x… or address" />
    <button id="nav-go">&#9654;</button>
  </div>

  <div id="idle" class="hidden">
    <p>No web3:// page active in this tab.</p>
  </div>
  <div id="proof">
    <div id="verdict">
      <span id="verdict-icon"></span>
      <span id="verdict-text"></span>
    </div>
    <table id="proof-table">
      <tbody>
        <tr><td>URL</td><td id="pf-url">—</td></tr>
        <tr><td>Block</td><td id="pf-block">—</td></tr>
        <tr><td>Block hash</td><td id="pf-block-hash">—</td></tr>
        <tr><td>Tx hash</td><td id="pf-tx-hash">—</td></tr>
        <tr><td>Tx index</td><td id="pf-tx-index">—</td></tr>
        <tr><td>Trie verified</td><td id="pf-trie">—</td></tr>
        <tr><td>Header</td><td id="pf-header">—</td></tr>
        <tr><td>Content-Type</td><td id="pf-ct">—</td></tr>
        <tr><td>Payload</td><td id="pf-size">—</td></tr>
      </tbody>
    </table>
  </div>
  <div id="footer">
    <button id="settings-btn">⚙ RPC Settings</button>
  </div>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
